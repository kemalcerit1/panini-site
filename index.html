<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini WC 2026 - Koleksiyon Kontrolü</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="country-header tr-theme">
            <div class="flag-info">
                <img src="https://flagcdn.com/w80/tr.png" alt="Türkiye">
                <span class="country-name">Türkiye</span>
            </div>
            <div class="progress-info">
                <span class="progress-percent">75%</span>
            </div>
        </div>

        <div class="album-grid">
            
            <div class="card status-owned"><span>TUR</span> 1<div class="tick">✓</div></div>
            <div class="card status-owned"><span>TUR</span> 2<div class="tick">✓</div></div>
            <div class="card status-owned"><span>TUR</span> 3<div class="tick">✓</div></div>
            <div class="card status-owned"><span>TUR</span> 4<div class="tick">✓</div></div>
            <div class="card status-owned"><span>TUR</span> 5<div class="tick">✓</div></div>
            
            <div class="card status-missing"><span>TUR</span> 6</div>
            <div class="card status-missing"><span>TUR</span> 7</div>
            
            <div class="card status-owned has-duplicate">
                <span>TUR</span> 8
                <div class="duplicate-tag">+1</div>
                <div class="tick">✓</div>
            </div>
            
            <div class="card status-owned"><span>TUR</span> 9<div class="tick">✓</div></div>
            <div class="card status-owned"><span>TUR</span> 10<div class="tick">✓</div></div>
            <div class="card status-owned"><span>TUR</span> 11<div class="tick">✓</div></div>
            
            <div class="card status-missing"><span>TUR</span> 12</div>
            
            <div class="card status-missing"><span>TUR</span> 13</div>
            
            <div class="card status-owned"><span>TUR</span> 14<div class="tick">✓</div></div>
            <div class="card status-owned"><span>TUR</span> 15<div class="tick">✓</div></div>
            <div class="card status-owned"><span>TUR</span> 16<div class="tick">✓</div></div>
            <div class="card status-owned"><span>TUR</span> 17<div class="tick">✓</div></div>
            <div class="card status-owned"><span>TUR</span> 18<div class="tick">✓</div></div>
            <div class="card status-owned"><span>TUR</span> 19<div class="tick">✓</div></div>
            
            <div class="card status-missing"><span>TUR</span> 20</div>
            
        </div>

        <p class="summary-text">Panini World Cup 2026 - Dijital Kontrol Listesi</p>
    </div>
</body>
</html>
