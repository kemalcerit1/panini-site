<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Panini 2026 Koleksiyonum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Panini World Cup 2026</h1>
        
        <div class="stats-card">
            <h2>Albüm Tamamlanma Oranı</h2>
            <div class="progress-bar">
                <div class="progress" style="width: 71%;">%71</div>
            </div>
            <p>Hedef: %100 | Kalan: %29</p>
        </div>

        <div class="sections">
            <div class="card">
                <h3>Eksik Kartlarım</h3>
                <ul id="missing-list">
                    <li>Numara: 124</li>
                    <li>Numara: 256</li>
                    <li>Numara: 412</li>
                </ul>
            </div>
            
            <div class="card">
                <h3>Takaslıklar (Duplicate)</h3>
                <ul id="duplicate-list">
                    <li>Numara: 05 (2 adet)</li>
                    <li>Numara: 88</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
