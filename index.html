<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini World Cup 2026 - Koleksiyonum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Panini World Cup 2026</h1>
        
        <div class="stats-card">
            <h2>Albüm Tamamlanma Oranı</h2>
            <div class="progress-bar">
                <div class="progress" style="width: 71%;">%71</div>
            </div>
            <p>Hedef: %100 | Kalan: %29</p>
        </div>

        <div class="input-section">
            <input type="text" id="card-number" placeholder="Kart numarası yaz... (Örn: 124)">
            <select id="card-type">
                <option value="missing">Eksik Kart</option>
                <option value="duplicate">Takaslık (Duplicate)</option>
            </select>
            <button onclick="addCard()">Listeye Ekle</button>
        </div>

        <div class="sections">
            <div class="card">
                <h3>Eksik Kartlarım</h3>
                <ul id="missing-list">
                    </ul>
            </div>
            
            <div class="card">
                <h3>Takaslıklar</h3>
                <ul id="duplicate-list">
                    </ul>
            </div>
        </div>
    </div>

    <script>
        function addCard() {
            const numberInput = document.getElementById('card-number');
            const typeSelect = document.getElementById('card-type');
            const cardValue = numberInput.value.trim();

            if (cardValue === '') {
                alert('Lütfen bir kart numarası girin!');
                return;
            }

            // Seçilen tipe göre doğru listeyi bul
            let listId = typeSelect.value === 'missing' ? 'missing-list' : 'duplicate-list';
            const targetList = document.getElementById(listId);

            // Yeni liste elemanı oluştur
            const li = document.createElement('li');
            li.innerHTML = `Numara: ${cardValue} <span class="delete-btn" onclick="this.parentElement.remove()">✕</span>`;
            
            targetList.appendChild(li);
            
            // Kutuyu temizle
            numberInput.value = '';
        }
    </script>
</body>
</html>
